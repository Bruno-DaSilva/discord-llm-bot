name: CI
on:
  push:
  pull_request:
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --locked
      - run: uv run ruff check src/ tests/
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --locked
      - run: uv run pytest
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v7
        with:
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
